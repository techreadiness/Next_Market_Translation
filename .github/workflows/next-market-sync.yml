name: Next-Market-Full-Fix

on:
  push:
    paths:
      - 'ko/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 에러 해결 핵심: Python 라이브러리 설치
      - name: Install Python Dependencies
        run: pip install requests

      - name: Secure Translation and Recovery
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          # ko 폴더 내 모든 MD 파일 번역 (SUMMARY.md 포함)
          find ko -name "*.md" | while read file; do
            REL_PATH=${file#ko/}
            TARGET_FILE="en/$REL_PATH"
            mkdir -p "$(dirname "$TARGET_FILE")"

            python3 - <<EOF
import re, requests, os, sys

def run():
    api_key = os.environ.get('DEEPL_API_KEY')
    with open('$file', 'r', encoding='utf-8') as f:
        content = f.read()

    # 2. metaLinks 에러 해결: Front Matter(--- 사이 영역) 분리
    # 파일 시작의 --- 부터 다음 --- 까지를 정규식으로 정확히 떼어냅니다.
    fm_match = re.match(r'^---\s*\n(.*?)\n---\s*\n', content, re.DOTALL | re.MULTILINE)
    
    if fm_match:
        front_matter = fm_match.group(0) # 설정 영역 그대로 보존
        body = content[fm_match.end():]
    else:
        front_matter = ""
        body = content

    # 3. Next Market 및 이미지 태그 보호
    body = body.replace("Next Market", '<span translate="no">Next Market</span>')
    body = re.sub(r'(!?\[[^]]*\]\([^)]*\))', r'<span translate="no">\1</span>', body)

    # 4. DeepL API 호출
    url = "https://api-free.deepl.com/v2/translate"
    data = {
        "auth_key": api_key,
        "text": body,
        "source_lang": "KO",
        "target_lang": "EN-US",
        "tag_handling": "html"
    }
    
    try:
        res = requests.post(url, data=data).json()
        translated_body = res['translations'][0]['text']
    except Exception as e:
        print(f"Error at $file: {e}")
        translated_body = body

    # 5. 후처리: 보호 태그 제거 및 깨진 문법 수리
    translated_body = re.sub(r'<\/?span[^>]*>', '', translated_body)
    translated_body = re.sub(r'! ?\[([^]]*)\]\s*\(([^)]*)\)', r'![\1](\2)', translated_body)
    translated_body = re.sub(r'\[([^]]*)\]\s*\(([^)]*)\)', r'[\1](\2)', translated_body)

    # 6. 최종 결합 (원본 설정 + 영어 본문)
    with open('$TARGET_FILE', 'w', encoding='utf-8') as f:
        f.write(front_matter + translated_body)

run()
EOF
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add en/
          git commit -m "docs: Fix requests error and metaLinks sidebar issue" || echo "No changes"
          git push origin main
