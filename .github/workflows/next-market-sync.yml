name: Next-Market-Full-Fix

on:
  push:
    paths:
      - "ko/**/*.md"
  workflow_dispatch: # 수동으로 한 번에 다 밀어버릴 때 사용

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Secure Translation
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          set -e
          
          # 전체 파일을 다시 만들기 위해 find 사용
          FILES=$(find ko -name "*.md")

          for file in $FILES; do
            REL_PATH=${file#ko/}
            TARGET_FILE="en/$REL_PATH"
            mkdir -p "$(dirname "$TARGET_FILE")"

            # 1. 머리말(YAML)과 본문(Body)을 칼같이 분리 (에러 원천 차단)
            # --- 사이의 설정값은 번역기에 안 보내고 따로 보관합니다.
            FRONT_MATTER=$(awk 'BEGIN{flag=0} /^---$/{if(flag==0){flag=1; next} else{exit}} flag==1{print}' "$file")
            BODY=$(awk 'BEGIN{flag=0} /^---$/{if(flag==0){flag=1; next} else{flag=2; next}} flag==2{print}' "$file")

            if [ -z "$FRONT_MATTER" ]; then BODY=$(cat "$file"); fi

            # 2. 본문 내 보호 조치 (Next Market + 이미지/링크)
            PROTECTED_BODY=$(echo "$BODY" | sed 's/Next Market/<span translate="no">Next Market<\/span>/g')
            PROTECTED_BODY=$(echo "$PROTECTED_BODY" | sed -E 's/(!?\[[^]]*\]\([^)]*\))/<span translate="no">\1<\/span>/g')

            # 3. DeepL 호출 (본문만!)
            RESPONSE=$(curl -s -X POST "https://api-free.deepl.com/v2/translate" \
              -H "Authorization: DeepL-Auth-Key $DEEPL_API_KEY" \
              --data-urlencode "text=$PROTECTED_BODY" \
              -d "source_lang=KO" \
              -d "target_lang=EN-US" \
              -d "tag_handling=html")

            TRANSLATED_BODY=$(echo "$RESPONSE" | jq -r '.translations[0].text // empty')

            # 4. 후처리: 보호 태그 제거 및 깨진 링크 공백 수리
            FINAL_BODY=$(echo "$TRANSLATED_BODY" | sed -E 's/<\/?span[^>]*>//g')
            FINAL_BODY=$(echo "$FINAL_BODY" | sed -E 's/(!?\[[^]]*\]) *\(([^)]*)\)/\1(\2)/g')

            # 5. 원본 머리말 다시 붙여서 저장
            if [ -n "$FRONT_MATTER" ]; then
              echo -e "---\n$FRONT_MATTER\n---\n\n$FINAL_BODY" > "$TARGET_FILE"
            else
              echo "$FINAL_BODY" > "$TARGET_FILE"
            fi
          done

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add en/
          git commit -m "docs: en 폴더 전체 재구축 및 metaLinks 에러 수정" || echo "No changes"
          git push origin main
