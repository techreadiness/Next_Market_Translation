name: Next-Market-TW-Fix

on:
  push:
    paths:
      - "en/**/*.md"  # 영어 파일 감지
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Secure Translation (EN to ZH-HANT)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          set -e
          
          # en 폴더에서 모든 md 파일 찾기
          FILES=$(find en -name "*.md")

          for file in $FILES; do
            REL_PATH=${file#en/}
            TARGET_FILE="zh-hant/$REL_PATH"  # 대만 번체 폴더
            mkdir -p "$(dirname "$TARGET_FILE")"

            # 1. Front Matter(머리말) 분리
            FRONT_MATTER=$(awk 'BEGIN{flag=0} /^---$/{if(flag==0){flag=1; next} else{exit}} flag==1{print}' "$file")
            BODY=$(awk 'BEGIN{flag=0} /^---$/{if(flag==0){flag=1; next} else{flag=2; next}} flag==2{print}' "$file")

            if [ -z "$FRONT_MATTER" ]; then BODY=$(cat "$file"); fi

            # 2. 본문 보호 (Next Market 명칭 + 이미지/링크)
            # 대만 번체 번역 시에도 링크 보호를 위해 span 태그 사용
            PROTECTED_BODY=$(echo "$BODY" | sed 's/Next Market/<span translate="no">Next Market<\/span>/g')
            PROTECTED_BODY=$(echo "$PROTECTED_BODY" | sed -E 's/(!?\[[^]]*\]\([^)]*\))/<span translate="no">\1<\/span>/g')

            # 3. DeepL 호출 (Target: ZH-HANT)
            RESPONSE=$(curl -s -X POST "https://api-free.deepl.com/v2/translate" \
              -H "Authorization: DeepL-Auth-Key $DEEPL_API_KEY" \
              --data-urlencode "text=$PROTECTED_BODY" \
              -d "source_lang=EN" \
              -d "target_lang=ZH-HANT" \
              -d "tag_handling=html")

            TRANSLATED_BODY=$(echo "$RESPONSE" | jq -r '.translations[0].text // empty')

            # 4. 후처리: 보호 태그 제거 및 대만식 전각 괄호/문장부호 교정
            # 번체 번역 시 괄호가 （ ）로 바뀌는 것을 방지
            FINAL_BODY=$(echo "$TRANSLATED_BODY" | sed -E 's/<\/?span[^>]*>//g')
            FINAL_BODY=$(echo "$FINAL_BODY" | sed -E 's/（/(/g' | sed -E 's/）/)/g')
            FINAL_BODY=$(echo "$FINAL_BODY" | sed -E 's/(!?\[[^]]*\]) *\(([^)]*)\)/\1(\2)/g')

            # 5. 저장
            if [ -n "$FRONT_MATTER" ]; then
              echo -e "---\n$FRONT_MATTER\n---\n\n$FINAL_BODY" > "$TARGET_FILE"
            else
              echo "$FINAL_BODY" > "$TARGET_FILE"
            fi
          done

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add zh-hant/
          git commit -m "docs: Auto-translate EN to ZH-HANT (Taiwan)" || echo "No changes"
          git push origin main
